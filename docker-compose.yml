services:
  # ==========================================
  # PLATFORM SERVICES
  # ==========================================
  
  # Frontend Dev Server (React/Vite)
  client:
    image: node:20-alpine
    container_name: codion-client
    working_dir: /app
    volumes:
      - ./client:/app
    expose:
      - "5173"
    command: sh -c "npm install && npm run dev"
    environment:
      - CHOKIDAR_USEPOLLING=true
    networks:
      - codion_net

  # Backend Dev Server (FastAPI)
  api:
    image: python:3.11-alpine
    container_name: codion-api
    working_dir: /app
    volumes:
      - ./api:/app
    ports:
      - "8000:8000"
    command: sh -c "pip install fastapi pydantic uvicorn[standard] python-dotenv && uvicorn main:app --host 0.0.0.0 --port 8000 --reload"
    environment:
      - CORS_ORIGINS=http://localhost:5173,http://127.0.0.1:5173,http://localhost
    networks:
      - codion_net
    depends_on:
      - codion-mysql

  # NGINX API Gateway
  gateway:
    image: nginx:alpine
    container_name: codion-gateway
    ports:
      - "80:80"
    volumes:
      - ./infra/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - api
    networks:
      - codion_net

  # ==========================================
  # DATABASE SERVICES
  # ==========================================

  # MySQL Database (Main app data)
  codion-mysql:
    image: mysql:8.0
    container_name: codion-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root_password_123
      MYSQL_DATABASE: codion_db
      MYSQL_USER: codion_user
      MYSQL_PASSWORD: codion_password_123
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - codion_net

  # phpMyAdmin (Web UI for MySQL)
  phpmyadmin:
    image: phpmyadmin:latest
    container_name: codion-phpmyadmin
    restart: unless-stopped
    environment:
      PMA_HOST: codion-mysql
      MYSQL_ROOT_PASSWORD: root_password_123
    ports:
      - "8080:80" # Maps phpMyAdmin to localhost:8080
    depends_on:
      - codion-mysql
    networks:
      - codion_net

volumes:
  mysql_data:

networks:
  codion_net:
