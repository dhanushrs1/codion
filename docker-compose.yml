services:
  # ==========================================
  # PLATFORM SERVICES
  # ==========================================

  # Main FastAPI — auth + judge proxy only
  api:
    image: python:3.11-slim
    container_name: codion-api
    working_dir: /app
    volumes:
      - ./api:/app
    command: >
      sh -c "pip install -r requirements.txt --quiet &&
             uvicorn main:app --host 0.0.0.0 --port 8000 --reload"
    environment:
      DATABASE_URL: "mysql+aiomysql://${MYSQL_USER}:${MYSQL_PASSWORD}@codion-mysql:3306/${MYSQL_DATABASE}"
      CORS_ORIGINS: "${CORS_ORIGINS}"
      FRONTEND_URL: "${FRONTEND_URL}"
      WATCHFILES_FORCE_POLLING: "true"
      JWT_SECRET: "${JWT_SECRET}"
      JWT_EXPIRE_MINUTES: "${JWT_EXPIRE_MINUTES:-60}"
      GOOGLE_CLIENT_ID: "${GOOGLE_CLIENT_ID}"
      GOOGLE_CLIENT_SECRET: "${GOOGLE_CLIENT_SECRET}"
      GITHUB_CLIENT_ID: "${GITHUB_CLIENT_ID}"
      GITHUB_CLIENT_SECRET: "${GITHUB_CLIENT_SECRET}"
      CLOUDINARY_URL: "${CLOUDINARY_URL}"
      CLOUDINARY_CLOUD_NAME: "${CLOUDINARY_CLOUD_NAME}"
      CLOUDINARY_API_KEY: "${CLOUDINARY_API_KEY}"
      CLOUDINARY_API_SECRET: "${CLOUDINARY_API_SECRET}"
      CLOUDINARY_PUBLIC_ID_PREFIX: "${CLOUDINARY_PUBLIC_ID_PREFIX:-codion}"
      JUDGE_URL: "http://codion-judge:2358"
    networks:
      - codion_net
    depends_on:
      codion-mysql:
        condition: service_healthy
      codion-judge:
        condition: service_healthy
    restart: unless-stopped

  # Frontend Dev Server (React/Vite)
  client:
    image: node:20-alpine
    container_name: codion-client
    working_dir: /app
    volumes:
      - ./client:/app
    expose:
      - "5173"
    command: sh -c "npm install && npm run dev -- --host"
    environment:
      CHOKIDAR_USEPOLLING: "true"
    networks:
      - codion_net
    restart: unless-stopped

  # NGINX — single public entry point on port 80
  gateway:
    image: nginx:alpine
    container_name: codion-gateway
    ports:
      - "80:80"
    volumes:
      - ./infra/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - api
      - client
    networks:
      - codion_net
    restart: unless-stopped

  # ==========================================
  # JUDGE MICROSERVICES (isolated execution engine)
  # ==========================================

  # Judge FastAPI — receives submissions, enqueues to Redis, polls results
  # NOT exposed to the public internet — internal Docker network only
  codion-judge:
    build:
      context: ./judge
      dockerfile: Dockerfile
    container_name: codion-judge
    restart: unless-stopped
    environment:
      REDIS_URL: "redis://codion-redis:6379/0"
      JUDGE_CPU_TIME_LIMIT: "5"
      JUDGE_MEMORY_LIMIT_MB: "128"
    networks:
      - codion_net
    depends_on:
      - codion-redis
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:2358/health')"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 15s

  # Judge Worker — standalone process that consumes jobs from Redis queue
  # Separate from the judge API so the API stays fast and non-blocking
  codion-judge-worker:
    build:
      context: ./judge
      dockerfile: Dockerfile
    container_name: codion-judge-worker
    # Override CMD: run the worker script instead of the FastAPI server
    command: ["python", "worker.py"]
    restart: unless-stopped
    environment:
      REDIS_URL: "redis://codion-redis:6379/0"
      JUDGE_CPU_TIME_LIMIT: "5"
      JUDGE_MEMORY_LIMIT_MB: "128"
    networks:
      - codion_net
    depends_on:
      - codion-redis

  # Redis — message broker and job state store
  # NOT exposed to the public internet — internal Docker network only
  codion-redis:
    image: redis:7-alpine
    container_name: codion-redis
    restart: unless-stopped
    command: redis-server --save "" --appendonly no   # ephemeral — jobs don't need persistence
    networks:
      - codion_net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # ==========================================
  # DATABASE SERVICES
  # ==========================================

  codion-mysql:
    image: mysql:8.0
    container_name: codion-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: "${MYSQL_ROOT_PASSWORD}"
      MYSQL_DATABASE: "${MYSQL_DATABASE}"
      MYSQL_USER: "${MYSQL_USER}"
      MYSQL_PASSWORD: "${MYSQL_PASSWORD}"
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - codion_net
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-u", "root", "-p${MYSQL_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  phpmyadmin:
    image: phpmyadmin:latest
    container_name: codion-phpmyadmin
    restart: unless-stopped
    environment:
      PMA_HOST: codion-mysql
      PMA_PORT: 3306
      PMA_USER: root
      PMA_PASSWORD: "${MYSQL_ROOT_PASSWORD}"
      MYSQL_ROOT_PASSWORD: "${MYSQL_ROOT_PASSWORD}"
    ports:
      - "8080:80"
    depends_on:
      codion-mysql:
        condition: service_healthy
    networks:
      - codion_net

volumes:
  mysql_data:

networks:
  codion_net:
    driver: bridge
