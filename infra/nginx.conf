# ============================================================================
# Codion API Gateway (NGINX)
# ----------------------------------------------------------------------------
# This file is the single entry point for browser traffic.
#
# Responsibilities:
# 1. Serve the static React + Vite frontend from /usr/share/nginx/html
# 2. Forward /api/* traffic to the FastAPI backend service
# 3. Keep frontend and backend concerns strictly separated
#
# Non-responsibilities:
# - No business logic
# - No code execution
# - No authentication decisions
# ============================================================================

worker_processes auto;

events {
    # Max concurrent connections per worker process.
    worker_connections 1024;
}

http {
    # MIME map enables browser-friendly Content-Type headers.
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # Conservative performance defaults that are safe for most deployments.
    sendfile on;
    tcp_nopush on;
    keepalive_timeout 65;

    # Optional but useful compression for static text assets.
    gzip on;
    gzip_types text/plain text/css application/json application/javascript application/xml+rss image/svg+xml;

    # Internal upstream for FastAPI.
    # In Docker Compose/Kubernetes this hostname should resolve to the API service.
    upstream codion_api_backend {
        server api:8000;
    }

    server {
        listen 80;
        server_name _;

        # Vite build output location.
        # During container image build, copy client/dist into this directory.
        root /usr/share/nginx/html;
        index index.html;

        # --------------------------------------------------------------------
        # API ROUTING
        # --------------------------------------------------------------------
        # Any request beginning with /api/ is proxied to FastAPI.
        # We intentionally keep the /api prefix so backend routes can be versioned
        # cleanly (for example: /api/v1/submissions).
        location /api/ {
            proxy_pass http://codion_api_backend;
            proxy_http_version 1.1;

            # Preserve request context for backend logging and tracing.
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            proxy_redirect off;
        }

        # --------------------------------------------------------------------
        # FRONTEND ROUTING
        # --------------------------------------------------------------------
        # For SPAs, unknown paths must return index.html so React Router can
        # handle client-side navigation.
        location / {
            try_files $uri $uri/ /index.html;
        }
    }
}
