# ============================================================================
# Codion API Gateway (NGINX)
# ----------------------------------------------------------------------------
# This file is the single entry point for browser traffic.
#
# Responsibilities:
# 1. Forward frontend traffic to the React/Vite service
# 2. Forward /api/* traffic to the FastAPI backend service
# 3. Keep frontend and backend concerns strictly separated
#
# Non-responsibilities:
# - No business logic
# - No code execution
# - No authentication decisions
# ============================================================================

worker_processes auto;

events {
    # Max concurrent connections per worker process.
    worker_connections 1024;
}

http {
    # MIME map enables browser-friendly Content-Type headers.
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # Conservative performance defaults that are safe for most deployments.
    sendfile on;
    tcp_nopush on;
    keepalive_timeout 65;

    # Optional but useful compression for static text assets.
    gzip on;
    gzip_types text/plain text/css application/json application/javascript application/xml+rss image/svg+xml;

    # Internal upstream for FastAPI.
    # In Docker Compose/Kubernetes this hostname should resolve to the API service.
    upstream codion_api_backend {
        server api:8000;
    }

    upstream codion_client_frontend {
        server client:5173;
    }

    server {
        listen 80;
        server_name _;

        # --------------------------------------------------------------------
        # API ROUTING — /api/*, /auth/*, /health
        # --------------------------------------------------------------------
        # Requests to /api/ are versioned backend routes.
        # Requests to /auth/ are OAuth2 callbacks — MUST reach FastAPI.
        # Requests to /health are the liveness check endpoint.
        location /api/ {
            proxy_pass http://codion_api_backend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_redirect off;
        }

        location /auth/ {
            proxy_pass http://codion_api_backend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_redirect off;
        }

        location /health {
            proxy_pass http://codion_api_backend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_redirect off;
        }

        # --------------------------------------------------------------------
        # FRONTEND ROUTING (single public entrypoint)
        # --------------------------------------------------------------------
        # All non-API paths are forwarded to the frontend service so users can
        # always use http://localhost without exposing :5173.
        # WebSocket upgrade headers keep Vite HMR working through the gateway.
        location / {
            proxy_pass http://codion_client_frontend;
            proxy_http_version 1.1;

            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";

            proxy_redirect off;
        }
    }
}
