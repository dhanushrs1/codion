# ============================================================================
# Codion Judge0 Guardrails
# ----------------------------------------------------------------------------
# These values are consumed by Codion tooling (API middleman + tests) to enforce
# strict per-submission limits.
#
# Limit policy:
# - Max execution time: 2 seconds
# - Max memory: 128 MB (131072 KB)
# - Internet access: disabled
# ============================================================================

JUDGE0_CPU_TIME_LIMIT=2
JUDGE0_MEMORY_LIMIT_KB=131072
JUDGE0_ENABLE_NETWORK=false

# Optional conservative defaults for future submissions.
JUDGE0_STACK_LIMIT_KB=64000
JUDGE0_MAX_FILE_SIZE_KB=1024
